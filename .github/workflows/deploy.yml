name: WordPress → Netlify CI/CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]
  workflow_dispatch:          # allow manual trigger from GitHub UI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & test ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint CSS / JS
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

  # ── Build & deploy ─────────────────────────────────────────────────────────
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: lint
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Node dependencies
        run: npm ci

      - name: Install Composer dependencies
        if: hashFiles('composer.json') != ''
        run: composer install --no-dev --optimize-autoloader

      # Determine build environment from branch
      - name: Set build environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "BUILD_ENV=production" >> $GITHUB_OUTPUT
          else
            echo "BUILD_ENV=staging" >> $GITHUB_OUTPUT
          fi

      - name: Build site
        run: bash scripts/build.sh --env ${{ steps.env.outputs.BUILD_ENV }}

      # ── Production deploy (main branch only) ────────────────────────────────
      - name: Deploy to Netlify (Production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: netlify/actions/cli@master
        with:
          args: deploy --prod --dir=dist --message "Deploy from GitHub Actions - ${{ github.sha }}"

      # ── Staging deploy (staging branch) ────────────────────────────────────
      - name: Deploy to Netlify (Staging)
        if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=dist --message "Staging deploy - ${{ github.sha }}"

      # ── PR Preview deploy ──────────────────────────────────────────────────
      - name: Deploy Preview (Pull Request)
        if: github.event_name == 'pull_request'
        id: preview
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=dist --message "PR #${{ github.event.pull_request.number }} preview"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview deployment ready!**\n\n${{ steps.preview.outputs.NETLIFY_URL }}`
            })

  # ── Notify on failure ─────────────────────────────────────────────────────
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint, deploy]
    if: failure()
    steps:
      - name: Send failure notification
        run: |
          echo "::error::Pipeline failed on branch ${{ github.ref }} — commit ${{ github.sha }}"
          # Add Slack/email notification here if needed

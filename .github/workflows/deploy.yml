name: Deploy to InfinityFree (FTP)

on:
  push:
    branches:
      - main
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI

jobs:
  deploy:
    name: FTP Deploy → gamerminds.kesug.com
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server:   ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port:     21
          protocol: ftp

          # Deploy to the subdomain web root on InfinityFree
          server-dir: /htdocs/

          # After first deploy this only uploads changed files (fast)
          dangerous-clean-slate: false

          # ── Files/folders to NEVER upload ─────────────────────────
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            src/**
            .env
            .env.*
            wp-config.php
            wp-config-production.php
            netlify.toml
            package.json
            package-lock.json
            webpack.config.js
            prepros.config
            DEPLOYMENT.md
            QUICKSTART.md
            README.md
            BLOCK_ORDER_GUIDE.md
            WORDPRESS_CONVERSION_SUMMARY.md
            scripts/**
            wp-content/themes/Create Illustrated Designs/**
            wp-content/themes/intervaults/**
            wp-content/themes/gm/**
            wp-content/themes/gm2/**
            wp-content/uploads/**
            wp-content/cache/**
            wp-content/upgrade/**
